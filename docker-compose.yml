

services:
  # ───────────────────────────────
  # Backend API (Node.js + Express)
  # ───────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tagger-app

    ports:
      - "3000:3000"

    env_file:
      - .env


    depends_on:
      - redis

    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads

    restart: unless-stopped

    networks:
      - tagger-network

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ───────────────────────────────
  # Redis (Queue / BullMQ)
  # ───────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tagger-redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    restart: unless-stopped

    networks:
      - tagger-network

    command: ["redis-server", "--appendonly", "yes"]

  # ───────────────────────────────
  # Frontend UI (React + Vite)
  # ───────────────────────────────
  frontend:
    build:
      context: ../Tagger-Ui
      dockerfile: Dockerfile
    container_name: tagger-frontend
    restart: unless-stopped
    networks:
      - tagger-network

  # ───────────────────────────────
  # Nginx (Reverse Proxy)
  # ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: tagger-nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro

    depends_on:
      - app
      - frontend

    restart: unless-stopped

    networks:
      - tagger-network

# ───────────────────────────────
# Volumes
# ───────────────────────────────
volumes:
  redis_data:

# ───────────────────────────────
# Network
# ───────────────────────────────
networks:
  tagger-network:
    driver: bridge